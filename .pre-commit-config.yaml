---
default_language_version:
    python: python3
repos:
    - repo: https://github.com/pre-commit/pre-commit-hooks
      rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c  # frozen: v6.0.0
      hooks:
          - id: check-case-conflict
          - id: check-json
          - id: check-merge-conflict
          - id: check-symlinks
          - id: check-toml
          - id: check-xml
          - id: check-yaml
          - id: destroyed-symlinks
          - id: detect-private-key
          - id: end-of-file-fixer
          - id: fix-byte-order-marker
          - id: forbid-new-submodules
          - id: mixed-line-ending
          - id: trailing-whitespace
            exclude: .tsv$
    - repo: https://github.com/codespell-project/codespell
      rev: 2ccb47ff45ad361a21071a7eedda4c37e6ae8c5a  # frozen: v2.4.2
      hooks:
          - id: codespell
            args: [--ignore-words=.codespellignore]
            exclude_types: [tsv, json]
    - repo: https://github.com/psf/black-pre-commit-mirror
      rev: 4160603246a6b365d4a2af661c6d71b0a0f50478  # frozen: 26.5.1
      hooks:
          - id: black
    - repo: https://github.com/jumanjihouse/pre-commit-hook-yamlfmt
      rev: 8d1b9cadaf854cb25bb0b0f5870e1cc66a083d6b  # frozen: 0.2.3
      hooks:
          - id: yamlfmt
    - repo: https://github.com/gitleaks/gitleaks
      rev: 83d9cd684c87d95d656c1458ef04895a7f1cbd8e  # frozen: v8.30.1
      hooks:
          - id: gitleaks
    - repo: https://github.com/woodruffw/zizmor-pre-commit
      rev: 9257c6050c0261b8c57e712f632dc4a8010109a9  # frozen: v1.25.2
      hooks:
          - id: zizmor
            args: [--fix=safe]
    - repo: https://github.com/doublify/pre-commit-rust
      rev: eeee35a89e69d5772bdee97db1a6a898467b686e  # frozen: v1.0
      hooks:
          - id: fmt
            args: [--all, --]
          - id: clippy
            args: [--locked, --workspace, --all-features, --all-targets, --, -D, warnings]
    - repo: https://github.com/Holzhaus/sourceheaders
      rev: 6356581a6cabada7f1dd6a5da699f8ab2d56998d  # frozen: v0.0.4
      hooks:
          - id: sourceheaders
    - repo: https://github.com/jorisroovers/gitlint
      rev: acc9d9de6369b76d22cb4167029d2035e8730b98  # frozen: v0.19.1
      hooks:
          - id: gitlint

ci:
    skip: [fmt, clippy]
